name: Xserver Deploy

on:
  push:
    branches:
      - main # mainブランチに送った時だけ動く

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. GitHubからコードを持ってくる
      - name: 🚚 Checkout
        uses: actions/checkout@v4

      # 2. FTPでエックスサーバーに送る
      - name: 🚀 FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # 【元】リポジトリ内の dist フォルダの中身を送る
          local-dir: ./dist/
          # 【先】エックスサーバーの公開ディレクトリを指定（末尾は / ）
          server-dir: /xs900721.xsrv.jp/public_html/yonsan-coffee/
